services:
  postgres:
    image: 'postgres:18-alpine'
    environment:
      POSTGRES_DB: calendary
      POSTGRES_USER: calendary
      POSTGRES_PASSWORD: calendary
    ports:
      - '5432:5432'
    volumes:
      - calendary-postgres-data:/var/lib/postgresql/data

  grafana-lgtm:
    image: 'grafana/otel-lgtm:latest'
    ports:
      - '3000:3000'
      - '4317'
      - '4318'

volumes:
  calendary-postgres-data:
