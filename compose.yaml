services:
  postgres:
    image: 'postgres:17-alpine'
    environment:
      POSTGRES_DB: calendary
      POSTGRES_USER: calendary
      POSTGRES_PASSWORD: calendary
    ports:
      - '5432:5432'
    volumes:
      - calendary-postgres-17-data:/var/lib/postgresql/data
volumes:
  calendary-postgres-17-data:
