<!doctype html>
<html lang="fr" data-theme="solar-orange" data-mode="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="theme-color" content="#f0701b" />
    <meta name="robots" content="index, follow" />
    <meta name="description" content="Calendary is a self-hosted personal calendar, time, task and project manager: plan events and tasks, share your availability publicly, and collaborate with your team." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Calendary" />
    <meta property="og:title" content="Calendary — personal calendar, tasks &amp; projects" />
    <meta property="og:description" content="Plan events and tasks, share your availability publicly, and collaborate with your team — a self-hosted calendar built for people who want full control of their schedule." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Calendary — personal calendar, tasks &amp; projects" />
    <meta name="twitter:description" content="Plan events and tasks, share your availability publicly, and collaborate with your team — a self-hosted calendar built for people who want full control of their schedule." />
    <meta name="twitter:image" content="/og-image.png" />
    <style>
      html[data-theme="solar-orange"] body { background: hsl(38 41% 97%); color: hsl(210 14% 13%); }
      html[data-theme="paper-green"] body { background: hsl(78 24% 96%); color: hsl(197 18% 13%); }
      html[data-theme="clear-blue"] body { background: hsl(210 33% 98%); color: hsl(215 25% 15%); }
      html[data-theme="ember-dark"] body { background: hsl(220 14% 10%); color: hsl(36 28% 92%); }
      html[data-theme="graphite-cyan"] body { background: hsl(210 11% 11%); color: hsl(195 22% 92%); }
      html[data-theme="plum-night"] body { background: hsl(240 13% 11%); color: hsl(260 18% 92%); }
    </style>
    <script>
      (function () {
        try {
          var themes = {
            "solar-orange": "light",
            "paper-green": "light",
            "clear-blue": "light",
            "ember-dark": "dark",
            "graphite-cyan": "dark",
            "plum-night": "dark"
          };
          var theme = localStorage.getItem("calendary.theme") || "solar-orange";
          if (!themes[theme]) theme = "solar-orange";
          document.documentElement.dataset.theme = theme;
          document.documentElement.dataset.mode = themes[theme];
        } catch (error) {
          document.documentElement.dataset.theme = "solar-orange";
          document.documentElement.dataset.mode = "light";
        }
      })();
    </script>
    <title>Calendary</title>
  </head>
  <body>
    <div id="root"><!--ssr-outlet--></div>
    <script type="module" src="/src/entry-client.tsx"></script>
  </body>
</html>
