spring.application.name=calendary

spring.datasource.url=${CALENDARY_DATABASE_URL:jdbc:postgresql://localhost:5432/calendary}
spring.datasource.username=${CALENDARY_DATABASE_USERNAME:calendary}
spring.datasource.password=${CALENDARY_DATABASE_PASSWORD:calendary}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never

# Coolify's reverse proxy terminates TLS and forwards plain HTTP with X-Forwarded-* headers.
# Without this, request.isSecure() is false behind the proxy and the session cookie never gets
# the Secure flag, even though the site is only ever served over HTTPS.
server.forward-headers-strategy=framework

app.web.allowed-origins=${CALENDARY_FRONTEND_ORIGIN:http://localhost:5173}

app.mail.from=${CALENDARY_MAIL_FROM:donilite@mail.me}
app.mail.reply-to=${CALENDARY_MAIL_REPLY_TO:yaomessan13@outlook.com}
app.mail.public-base-url=${CALENDARY_PUBLIC_BASE_URL:http://localhost:8080}

# Required by Gmail, Outlook and most transactional relays (e.g. Resend) on port 587.
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.storage.b2.enabled=${CALENDARY_B2_ENABLED:false}
app.storage.b2.key-id=${CALENDARY_B2_KEY_ID:}
app.storage.b2.application-key=${CALENDARY_B2_APPLICATION_KEY:}
app.storage.b2.bucket-id=${CALENDARY_B2_BUCKET_ID:}
app.storage.b2.bucket-name=${CALENDARY_B2_BUCKET_NAME:}
app.storage.b2.download-ttl-seconds=${CALENDARY_B2_DOWNLOAD_TTL_SECONDS:900}

app.google.calendar.enabled=${CALENDARY_GOOGLE_CALENDAR_ENABLED:false}
app.google.calendar.calendar-id=${CALENDARY_GOOGLE_CALENDAR_ID:}
app.google.calendar.service-account-email=${CALENDARY_GOOGLE_SERVICE_ACCOUNT_EMAIL:}
app.google.calendar.private-key=${CALENDARY_GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY:}
