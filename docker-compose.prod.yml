services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-calendary}
      POSTGRES_USER: ${POSTGRES_USER:-calendary}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - calendary-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-calendary}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/${GHCR_OWNER}/calendary-backend:${IMAGE_TAG:-latest}
    # Without this, `docker compose up -d` reuses whatever image is already cached locally
    # under the `latest` tag instead of checking GHCR for a newer one — deployments silently
    # keep running stale code even though CI pushed a fresh image.
    pull_policy: always
    environment:
      CALENDARY_DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-calendary}
      CALENDARY_DATABASE_USERNAME: ${POSTGRES_USER:-calendary}
      CALENDARY_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      CALENDARY_MAIL_FROM: ${CALENDARY_MAIL_FROM}
      CALENDARY_MAIL_REPLY_TO: ${CALENDARY_MAIL_REPLY_TO}
      CALENDARY_PUBLIC_BASE_URL: ${CALENDARY_PUBLIC_BASE_URL}
      # Public URL of the frontend app. The browser calls this API directly (CORS), so the
      # backend needs to know which origin to allow. Must match CALENDARY_API_BASE_URL's
      # counterpart below exactly (scheme + host), e.g. https://calendary.donilite.me
      CALENDARY_FRONTEND_ORIGIN: ${CALENDARY_FRONTEND_ORIGIN}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      CALENDARY_B2_ENABLED: ${CALENDARY_B2_ENABLED:-false}
      CALENDARY_B2_KEY_ID: ${CALENDARY_B2_KEY_ID}
      CALENDARY_B2_APPLICATION_KEY: ${CALENDARY_B2_APPLICATION_KEY}
      CALENDARY_B2_BUCKET_ID: ${CALENDARY_B2_BUCKET_ID}
      CALENDARY_B2_BUCKET_NAME: ${CALENDARY_B2_BUCKET_NAME}
      CALENDARY_B2_DOWNLOAD_TTL_SECONDS: ${CALENDARY_B2_DOWNLOAD_TTL_SECONDS:-900}
      CALENDARY_GOOGLE_CALENDAR_ENABLED: ${CALENDARY_GOOGLE_CALENDAR_ENABLED:-false}
      CALENDARY_GOOGLE_CALENDAR_ID: ${CALENDARY_GOOGLE_CALENDAR_ID}
      CALENDARY_GOOGLE_SERVICE_ACCOUNT_EMAIL: ${CALENDARY_GOOGLE_SERVICE_ACCOUNT_EMAIL}
      CALENDARY_GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${CALENDARY_GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '8080'
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GHCR_OWNER}/calendary-frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      PORT: 3000
      # The browser calls this URL directly (no server-side proxy), so it must be the
      # backend's public address, not the Docker-network hostname — e.g.
      # https://calendary-backend.donilite.me. The backend must allow this frontend's
      # origin via CALENDARY_FRONTEND_ORIGIN above for CORS to let the browser read the response.
      CALENDARY_API_BASE_URL: ${CALENDARY_API_BASE_URL}
    depends_on:
      - backend
    expose:
      - '3000'
    restart: unless-stopped

volumes:
  calendary-postgres-data:
